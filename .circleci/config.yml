version: 2.1

jobs:
  test:
    docker:
      - image: cimg/node:24.0
    working_directory: ~/project

    steps:
      - checkout

      - restore_cache:
          keys:
            - node-cache-{{ checksum "package-lock.json" }}
            - node-cache-

      - run:
          name: Install dependencies
          command: npm install

      - save_cache:
          paths:
            - node_modules
          key: node-cache-{{ checksum "package-lock.json" }}

      - run:
          name: Run ESLint (fail if any issue)
          command: npm run lint

      - run:
          name: Run Jest tests with coverage
          command: npm run test -- --coverage

  deploy:
    docker:
      - image: cimg/node:24.0

    steps:
      - run:
          name: Plan deployment
          command: |
            circleci run release plan "${CIRCLE_JOB}" \
              --environment-name="default" \
              --component-name="${CIRCLE_PROJECT_REPONAME}" \
              --target-version="1.0.${CIRCLE_BUILD_NUM}-${CIRCLE_SHA1:0:7}"
      - run:
          name: Trigger Netlify Build
          command: curl -X POST $NETLIFY_BUILD_HOOK
      - run:
          name: Update deployment status to running
          command: circleci run release update "${CIRCLE_JOB}" --status=RUNNING
      - run:
          name: Update deployment status to success
          command: circleci run release update "${CIRCLE_JOB}" --status=SUCCESS
          when: on_success
      - run:
          name: Update deployment status to failed
          command: circleci run release update "${CIRCLE_JOB}" --status=FAILED
          when: on_fail

workflows:
  version: 2
  ci_cd_pipeline:
    jobs:
      - test
      - deploy:
          requires:
            - test
          filters:
            branches:
              only: main
