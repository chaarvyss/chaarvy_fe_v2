version: 2.1

jobs:
  test_and_sonar:
    docker:
      - image: cimg/node:20.10

    working_directory: ~/project

    steps:
      - checkout

      # Restore cached node modules
      - restore_cache:
          keys:
            - node-cache-{{ checksum "package-lock.json" }}
            - node-cache-

      - run:
          name: Install dependencies
          command: npm install

      # Save cache for next builds
      - save_cache:
          paths:
            - node_modules
          key: node-cache-{{ checksum "package-lock.json" }}

      - run:
          name: Run Jest tests with coverage
          command: npm run test -- --coverage

      - run:
          name: Install Sonar Scanner
          command: |
            sudo apt-get update
            sudo apt-get install -y unzip wget
            wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
            unzip sonar-scanner-cli-5.0.1.3006-linux.zip
            echo 'export PATH=$PATH:$(pwd)/sonar-scanner-5.0.1.3006-linux/bin' >> $BASH_ENV

      - run:
          name: Extract Pull Request number
          command: |
            if [ -n "$CIRCLE_PULL_REQUEST" ]; then
              PR_NUMBER=$(echo $CIRCLE_PULL_REQUEST | awk -F'/' '{print $NF}')
              echo "export PR_NUMBER=$PR_NUMBER" >> $BASH_ENV
            fi

      - run:
          name: Run SonarCloud Analysis
          command: |
            source $BASH_ENV

            if [ -n "$PR_NUMBER" ]; then
              sonar-scanner \
                -Dsonar.host.url=https://sonarcloud.io \
                -Dsonar.login=$SONAR_TOKEN \
                -Dsonar.organization=chaarvyss \
                -Dsonar.projectKey=chaarvyss_chaarvy_fe_v2 \
                -Dsonar.pullrequest.key=$PR_NUMBER \
                -Dsonar.pullrequest.branch=$CIRCLE_BRANCH \
                -Dsonar.pullrequest.base=main
            else
              sonar-scanner \
                -Dsonar.host.url=https://sonarcloud.io \
                -Dsonar.login=$SONAR_TOKEN \
                -Dsonar.organization=chaarvyss \
                -Dsonar.projectKey=chaarvyss_chaarvy_fe_v2 \
                -Dsonar.branch.name=$CIRCLE_BRANCH
            fi

workflows:
  version: 2
  test_build_analyze:
    jobs:
      - test_and_sonar
