name: PR Title Check

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title format
        uses: amannn/action-semantic-pull-request@5369185dc9812f174fa58b03b13b79920b68f8e1
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Jira Ticket
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$TITLE" =~ [A-Z]+-[0-9]+ ]]; then
            echo "PR title must contain Jira ticket like PROJ-123"
            exit 1
          fi
